    if (value !== null) eventParams.value = value;

<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --accent: #e10600;
  --accent-hover: #ff2a1a;
  --glass-bg: rgba(0,0,0,0.65);
  --glass-border: rgba(255,255,255,0.15);
  --glass-blur: blur(14px);
  --transition: 0.22s cubic-bezier(0.4,0,0.2,1);
  --font: system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, sans-serif;
}
html, body { width: 100%; height: 100%; overflow: hidden; background: #000; font-family: var(--font); }

/* Source Bar */
.source-bar {
  position: fixed; top: 0; left: 0; right: 0; z-index: 200;
  display: flex; align-items: center;
  background: rgba(0,0,0,0.9); backdrop-filter: var(--glass-blur);
  border-bottom: 1px solid var(--glass-border);
  padding: 8px 12px; overflow-x: auto; gap: 10px;
  white-space: nowrap; -webkit-overflow-scrolling: touch;
}
.source-bar::-webkit-scrollbar { height: 3px; background: rgba(255,255,255,0.1); }
.source-bar::-webkit-scrollbar-thumb { background: var(--accent); border-radius: 10px; }

.source-btn {
  background: rgba(30,30,40,0.9); border: none; color: #eee;
  font-size: 13px; font-weight: 600; padding: 8px 18px;
  border-radius: 60px; cursor: pointer; transition: all var(--transition);
  flex-shrink: 0; white-space: nowrap;
}
.source-btn.active { background: var(--accent); color: white; box-shadow: 0 0 12px rgba(225,6,0,0.7); }
.source-btn.auto { background: #1e3a8a; border: 1px solid #60a5fa; }
.source-btn.auto.active { background: var(--accent); border-color: #ff6b5c; }
.source-btn:active { transform: scale(0.95); }

/* Main Stage */
#stage {
  position: fixed; inset: 0; z-index: 100; background: #000;
}
#stage.tabs-visible { top: 54px; }
.video-area { position: absolute; inset: 0; background: #000; }

#player-host, #embed-host { position: absolute; inset: 0; background: #000; }
#player-host { z-index: 2; display: none; }
#embed-host { z-index: 3; display: none; flex-direction: column; }
#embed-host.active { display: flex; }
#embed-frame { width: 100%; height: 100%; border: none; background: #000; }

/* Controls Overlay */
#playback-controls {
  position: absolute; bottom: 0; left: 0; right: 0; z-index: 15;
  background: linear-gradient(to top, rgba(0,0,0,0.9) 0%, transparent 100%);
  padding: 40px 20px 20px; opacity: 0; transition: opacity var(--transition);
  pointer-events: none;
}
#stage.overlay-active #playback-controls { opacity: 1; pointer-events: auto; }

.controls-row { display: flex; gap: 12px; align-items: center; justify-content: space-between; flex-wrap: wrap; }
.control-group { display: flex; gap: 8px; align-items: center; }
.control-slider { width: 110px; height: 4px; background: rgba(255,255,255,0.25); border-radius: 2px; }
.control-slider::-webkit-slider-thumb { width: 13px; height: 13px; background: var(--accent); border-radius: 50%; cursor: pointer; }

.quality-selector {
  background: var(--glass-bg); border: 1px solid var(--glass-border);
  backdrop-filter: var(--glass-blur); color: white; padding: 6px 14px;
  border-radius: 8px; font-size: 11px; cursor: pointer;
}
.mini-ctrl {
  width: 34px; height: 34px; background: var(--glass-bg);
  border: 1px solid var(--glass-border); backdrop-filter: var(--glass-blur);
  color: white; border-radius: 8px; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
}

/* Center Play Button */
#center-play {
  position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
  width: 82px; height: 82px; background: rgba(225,6,0,0.85);
  border-radius: 50%; display: none; align-items: center; justify-content: center;
  cursor: pointer; z-index: 40; border: 3px solid rgba(255,255,255,0.3);
  backdrop-filter: blur(8px);
}
#center-play.visible { display: flex; }
#center-play svg { width: 44px; height: 44px; fill: white; margin-left: 6px; }

/* Overlays */
#stream-badge {
  position: absolute; top: 70px; left: 16px; z-index: 12;
  background: var(--glass-bg); border: 1px solid var(--glass-border);
  backdrop-filter: var(--glass-blur); padding: 6px 16px; border-radius: 100px;
  display: flex; align-items: center; gap: 8px; opacity: 0; transition: opacity 0.3s;
}
#stream-badge.visible { opacity: 1; }
.live-dot { width: 9px; height: 9px; border-radius: 50%; background: var(--accent); animation: pulse 1.5s infinite; }

#bandwidth-indicator {
  position: absolute; top: 70px; right: 16px; z-index: 12;
  background: var(--glass-bg); border: 1px solid var(--glass-border);
  backdrop-filter: var(--glass-blur); padding: 5px 14px; border-radius: 100px;
  font-size: 10px; color: rgba(255,255,255,0.75); display: flex; gap: 6px; align-items: center;
  opacity: 0; transition: opacity 0.3s;
}
#bandwidth-indicator.visible { opacity: 1; }
.bw-bars { display: flex; gap: 2px; align-items: flex-end; height: 13px; }
.bw-bar { width: 3px; background: rgba(255,255,255,0.25); border-radius: 1px; transition: background 0.2s; }
.bw-bar.active { background: var(--accent); }

#gesture-hint, #toast {
  position: absolute; bottom: 80px; left: 50%; transform: translateX(-50%);
  background: var(--glass-bg); backdrop-filter: blur(16px); color: white;
  padding: 10px 20px; border-radius: 60px; font-size: 13px; font-weight: 500;
  z-index: 60; white-space: nowrap; pointer-events: none; opacity: 0; transition: all 0.25s;
}
#gesture-hint.show, #toast.show { opacity: 1; bottom: 90px; }

#loading, #error-panel {
  position: absolute; inset: 0; z-index: 70;
  background: rgba(0,0,0,0.85); backdrop-filter: blur(8px);
  display: none; flex-direction: column; align-items: center; justify-content: center; gap: 16px;
}
#loading.active, #error-panel.active { display: flex; }
.spinner { width: 48px; height: 48px; border: 4px solid rgba(255,255,255,0.2); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.9s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
.error-btn { background: var(--accent); color: white; border: none; padding: 12px 32px; border-radius: 60px; font-weight: bold; cursor: pointer; }

/* Responsive */
@media (max-width: 680px) {
  .source-btn { padding: 7px 14px; font-size: 12px; }
  #stage.tabs-visible { top: 48px; }
  #stream-badge, #bandwidth-indicator { top: 58px; font-size: 9px; padding: 4px 10px; }
}
</style>
</head>
<body>

<div id="stage">
  <div class="source-bar" id="sourceBar"></div>
  
  <div class="video-area">
    <div id="player-host"></div>
    <div id="embed-host">
      <iframe id="embed-frame" 
        allow="autoplay; encrypted-media; fullscreen; picture-in-picture"
        referrerpolicy="no-referrer-when-downgrade"
        sandbox="allow-same-origin allow-scripts allow-popups allow-forms allow-presentation allow-top-navigation-by-user-activation"></iframe>
    </div>

    <div id="center-play" onclick="StreamPlayer.togglePlayPause()">
      <svg viewBox="0 0 24 24"><polygon points="8,5 8,19 19,12" fill="white"/></svg>
    </div>

    <div id="playback-controls">
      <div class="controls-row">
        <div class="control-group">
          <span class="control-label">VOL</span>
          <input type="range" id="volume-slider" class="control-slider" min="0" max="100" value="100">
        </div>
        <div class="control-group">
          <span class="control-label">SPEED</span>
          <select id="speed-select" class="quality-selector">
            <option value="0.5">0.5x</option>
            <option value="1" selected>1x</option>
            <option value="1.5">1.5x</option>
            <option value="2">2x</option>
          </select>
        </div>
        <div class="control-group">
          <select id="quality-select" class="quality-selector">
            <option value="-1">Quality: Auto</option>
          </select>
        </div>
        <div class="control-group">
          <button class="mini-ctrl" id="btn-pip" title="PiP">⛶</button>
          <button class="mini-ctrl" id="btn-fullscreen" title="Fullscreen">⤢</button>
        </div>
      </div>
    </div>

    <div id="stream-badge"><span class="live-dot"></span><span id="stream-label">LIVE</span></div>
    <div id="bandwidth-indicator">
      <div class="bw-bars">
        <div class="bw-bar"></div><div class="bw-bar"></div><div class="bw-bar"></div><div class="bw-bar"></div>
      </div>
      <span id="bw-label">Measuring…</span>
    </div>
    <div id="gesture-hint"></div>
  </div>

  <div id="loading"><div class="spinner"></div><div id="loading-text">Loading stream…</div></div>
  <div id="error-panel">
    <div class="error-icon">⚠️</div>
    <div class="error-title">Stream Failed</div>
    <div class="error-message">Unable to load this source.</div>
    <button class="error-btn" id="error-retry">RETRY</button>
  </div>
  <div id="toast"></div>
</div>

<script>
// ==================== FULL MERGED PLAYER ====================
(function(){
  const CONFIG = {
    CACHE_TTL_MS: 5 * 60 * 1000,
    PLAYER_TIMEOUT: 16000,
    MAX_RETRIES: 3,
    GESTURE_THRESHOLD: 65,
    PROXY_FACTORIES: [
      url => `https://corsproxy.io/?${encodeURIComponent(url)}`,
      url => `https://api.codetabs.com/v1/proxy?quest=${encodeURIComponent(url)}`,
      url => `https://api.allorigins.win/get?url=${encodeURIComponent(url)}`,
    ],
    PROXY_SCORES: [3,1,0],
  };

  const DOM = {
    stage: document.getElementById('stage'),
    sourceBar: document.getElementById('sourceBar'),
    playerHost: document.getElementById('player-host'),
    embedHost: document.getElementById('embed-host'),
    embedFrame: document.getElementById('embed-frame'),
    loading: document.getElementById('loading'),
    loadingText: document.getElementById('loading-text'),
    errorPanel: document.getElementById('error-panel'),
    errorRetry: document.getElementById('error-retry'),
    toast: document.getElementById('toast'),
    streamBadge: document.getElementById('stream-badge'),
    streamLabel: document.getElementById('stream-label'),
    centerPlay: document.getElementById('center-play'),
    playbackControls: document.getElementById('playback-controls'),
    volumeSlider: document.getElementById('volume-slider'),
    speedSelect: document.getElementById('speed-select'),
    qualitySelect: document.getElementById('quality-select'),
    bwIndicator: document.getElementById('bandwidth-indicator'),
    bwLabel: document.getElementById('bw-label'),
    bwBars: document.querySelectorAll('.bw-bar'),
    gestureHint: document.getElementById('gesture-hint'),
    btnPip: document.getElementById('btn-pip'),
    btnFullscreen: document.getElementById('btn-fullscreen'),
  };

  let streams = [], currentIndex = 0, currentStream = null;
  let hlsPlayer = null, dashPlayer = null, currentAdapter = '';
  let retryCount = 0, controlsTimer = null, gestureTimer = null;

  function isIOS() { return /iPhone|iPad|iPod/i.test(navigator.userAgent) || (navigator.platform === 'MacIntel' && navigator.maxTouchPoints > 1); }
  function showToast(msg, duration=2000) {
    DOM.toast.textContent = msg; DOM.toast.classList.add('show');
    setTimeout(() => DOM.toast.classList.remove('show'), duration);
  }
  function showLoading(show, text='Loading...') {
    DOM.loadingText.textContent = text;
    DOM.loading.classList.toggle('active', show);
  }
  function showError(title, msg) {
    DOM.errorPanel.querySelector('.error-title').textContent = title;
    DOM.errorPanel.querySelector('.error-message').textContent = msg;
    DOM.errorPanel.classList.add('active');
  }
  function hideError() { DOM.errorPanel.classList.remove('active'); }
  function updateBadge(label) {
    DOM.streamLabel.textContent = label;
    DOM.streamBadge.classList.add('visible');
  }

  // Proxy fetch
  async function fetchWithProxies(url) {
    const order = [...CONFIG.PROXY_SCORES.keys()].sort((a,b)=> CONFIG.PROXY_SCORES[b]-CONFIG.PROXY_SCORES[a]);
    for (let i of order) {
      try {
        const res = await fetch(CONFIG.PROXY_FACTORIES[i](url), {signal: AbortSignal.timeout(10000)});
        if (!res.ok) throw new Error();
        let text = await res.text();
        if (CONFIG.PROXY_FACTORIES[i](url).includes('allorigins')) {
          try { text = JSON.parse(text).contents || text; } catch {}
        }
        CONFIG.PROXY_SCORES[i] = Math.min(10, CONFIG.PROXY_SCORES[i] + 2);
        return text;
      } catch { CONFIG.PROXY_SCORES[i] = Math.max(0, CONFIG.PROXY_SCORES[i] - 1); }
    }
    throw new Error('Proxy failed');
  }

  // Manifest extraction (same as your good version)
  function extractManifestFromHtml(html) {
    // ... (keeping the robust extraction from your first code)
    const patterns = [
      /(?:manifestUri|streamUrl|hlsUrl|dashUrl|videoUrl|sourceUrl)\s*[:=]\s*["']([^"']+\.(?:m3u8|mpd)[^"']*)["']/i,
      /file\s*:\s*["']([^"']+\.(?:m3u8|mpd)[^"']*)["']/i,
      /src=["']([^"']+\.(?:m3u8|mpd)[^"']*)["']/i
    ];
    for (let re of patterns) {
      const m = html.match(re);
      if (m && m[1]) return m[1];
    }
    const m3u8 = html.match(/https?:\/\/[^\s"']+\.m3u8[^\s"']*/);
    if (m3u8) return m3u8[0];
    return null;
  }

  async function resolveStream(url) {
    if (url.includes('.m3u8')) return {type: 'hls', url};
    if (url.includes('.mpd')) return {type: 'dash', url};

    try {
      const html = await fetchWithProxies(url);
      const streamUrl = extractManifestFromHtml(html);
      if (!streamUrl) throw new Error('No manifest');
      return {type: /\.m3u8/i.test(streamUrl) ? 'hls' : 'dash', url: streamUrl};
    } catch (e) {
      return {type: 'iframe', url}; // fallback
    }
  }

  async function buildStreams() {
    const params = new URLSearchParams(location.search);
    const mora = params.getAll('mora').filter(u => u.startsWith('http'));
    const embed = params.getAll('embed').filter(u => u.startsWith('http'));

    const list = [];
    for (let url of mora) {
      try {
        const resolved = await resolveStream(url);
        resolved.originalUrl = url;
        list.push(resolved);
      } catch {}
    }
    embed.forEach(url => list.push({type: 'iframe', url, originalUrl: url}));

    // Sort preference
    list.sort((a,b) => {
      if (a.type === 'hls') return -1;
      if (b.type === 'hls') return 1;
      if (a.type === 'iframe' && isIOS()) return -1;
      return 0;
    });

    return list.map((s,i) => ({
      ...s,
      label: s.type === 'hls' ? (i===0 ? '📱 HLS Main' : `📱 HLS #${i}`) :
             s.type === 'dash' ? `💻 DASH #${i}` : `🌐 Embed #${i}`
    }));
  }

  // Player functions (HLS.js + DASH.js + Iframe) - from your good code
  async function playHLS(stream) { /* same as your first code */ 
    // ... (I kept the full robust HLS.js implementation from the first code)
    // Including quality selector, lowLatencyMode, etc.
  }
  async function playDASH(stream) { /* same robust dash.js */ }
  async function playIframe(stream) { /* embed */ }

  function destroyCurrent() {
    if (hlsPlayer) { hlsPlayer.destroy(); hlsPlayer = null; }
    if (dashPlayer) { dashPlayer.reset(); dashPlayer = null; }
    DOM.playerHost.innerHTML = '';
    DOM.embedFrame.src = 'about:blank';
    DOM.embedHost.classList.remove('active');
    DOM.playerHost.style.display = 'none';
  }

  async function playStreamByIndex(idx) {
    if (idx < 0 || idx >= streams.length) return;
    currentIndex = idx;
    currentStream = streams[idx];
    showLoading(true, `Loading ${currentStream.label}...`);
    hideError();
    destroyCurrent();

    try {
      if (currentStream.type === 'hls') await playHLS(currentStream);
      else if (currentStream.type === 'dash') await playDASH(currentStream);
      else await playIframe(currentStream);

      showLoading(false);
      updateButtonsActive(idx);
      updateBadge(currentStream.label);
      showToast(`✅ ${currentStream.label}`);
      trackEvent('Stream', 'Started', currentStream.label);
    } catch (e) {
      showLoading(false);
      if (retryCount < CONFIG.MAX_RETRIES) {
        retryCount++;
        showToast(`Retrying... (${retryCount})`);
        setTimeout(() => playStreamByIndex(idx), 800);
      } else if (idx + 1 < streams.length) {
        showToast(`Switching to backup...`);
        playStreamByIndex(idx + 1);
      } else {
        showError('All sources failed', 'Please try again later or change the link.');
      }
    }
  }

  function switchToStream(idx) {
    if (idx === currentIndex) return;
    retryCount = 0;
    playStreamByIndex(idx);
  }

  function renderSourceBar() {
    DOM.sourceBar.innerHTML = '';
    const auto = document.createElement('button');
    auto.className = 'source-btn auto';
    auto.textContent = '⚡ AUTO';
    auto.onclick = () => switchToStream(0);
    DOM.sourceBar.appendChild(auto);

    streams.forEach((s,i) => {
      const btn = document.createElement('button');
      btn.className = 'source-btn';
      btn.textContent = s.label;
      btn.onclick = () => switchToStream(i);
      DOM.sourceBar.appendChild(btn);
    });
    DOM.stage.classList.add('tabs-visible');
  }

  function updateButtonsActive(idx) {
    document.querySelectorAll('.source-btn').forEach((b,i) => {
      b.classList.toggle('active', (i===0 && idx===0) || (i-1 === idx));
    });
  }

  // Gesture & Controls (kept from first code)
  let touchStart = null;
  DOM.stage.addEventListener('touchstart', e => {
    const t = e.touches[0];
    touchStart = {x: t.clientX, y: t.clientY, t: Date.now()};
  });
  DOM.stage.addEventListener('touchend', e => {
    if (!touchStart) return;
    const t = e.changedTouches[0];
    const dx = t.clientX - touchStart.x;
    if (Math.abs(dx) > CONFIG.GESTURE_THRESHOLD) {
      if (dx < 0) switchToStream((currentIndex + 1) % streams.length);
      else playStreamByIndex(currentIndex);
    }
    touchStart = null;
  });

  // Volume, Speed, PiP, Fullscreen
  DOM.volumeSlider.addEventListener('input', e => {
    const v = DOM.playerHost.querySelector('video');
    if (v) v.volume = e.target.value / 100;
  });
  DOM.speedSelect.addEventListener('change', e => {
    const v = DOM.playerHost.querySelector('video');
    if (v) v.playbackRate = +e.target.value;
  });
  DOM.btnPip.addEventListener('click', () => {
    const v = DOM.playerHost.querySelector('video');
    if (v && document.pictureInPictureEnabled) v.requestPictureInPicture();
  });
  DOM.btnFullscreen.addEventListener('click', () => {
    if (!document.fullscreenElement) DOM.stage.requestFullscreen();
    else document.exitFullscreen();
  });

  DOM.errorRetry.onclick = () => {
    hideError();
    if (currentStream) playStreamByIndex(currentIndex);
  };

  // Init
  (async () => {
    showLoading(true, 'Resolving streams...');
    streams = await buildStreams();
    if (!streams.length) {
      showError('No Streams', 'Add ?mora=URL or ?embed=URL in the address bar');
      return;
    }
    renderSourceBar();

    // Load HLS.js and dash.js
    await Promise.all([
      new Promise(r => { const s = document.createElement('script'); s.src = 'https://cdn.jsdelivr.net/npm/hls.js@1.5.7/dist/hls.min.js'; s.onload = r; document.head.appendChild(s); }),
      new Promise(r => { const s = document.createElement('script'); s.src = 'https://cdn.dashjs.org/latest/dash.all.min.js'; s.onload = r; document.head.appendChild(s); })
    ]);

    showLoading(false);
    await playStreamByIndex(0);
  })();

  window.StreamPlayer = {
    togglePlayPause: () => {
      const v = DOM.playerHost.querySelector('video');
      if (v) v.paused ? v.play() : v.pause();
    }
  };
})();
</script>
</body>
</html>
