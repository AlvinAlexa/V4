<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Live Stream Player | Stable Multi-Engine</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@500;700;900&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jwplayer.com/libraries/IDzF9Zmk.js"></script>

<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--red:#e8192c;--red-dim:rgba(232,25,44,0.18);--red-glow:rgba(232,25,44,0.45);--bg:#080808;--bg2:#111;--glass:rgba(10,10,10,0.72);--border:rgba(255,255,255,0.09);--border2:rgba(255,255,255,0.18);--text:#f0f0f0;--muted:rgba(255,255,255,0.45);--success:#00d68f;--warn:#ffb800;--error:#e8192c;--font-head:'Barlow Condensed',sans-serif;--font-body:'Barlow',sans-serif;--ease:cubic-bezier(0.25,0.46,0.45,0.94);--radius:8px;--tab-h:46px}
html,body{width:100%;height:100%;overflow:hidden;background:var(--bg);font-family:var(--font-body);color:var(--text)}
#tab-bar{position:fixed;top:0;left:0;right:0;z-index:300;height:var(--tab-h);background:var(--bg2);border-bottom:1px solid var(--border);display:none;align-items:stretch;overflow-x:auto;gap:0}
#tab-bar::-webkit-scrollbar{display:none}
#tab-bar.show{display:flex}
.tab-btn{display:flex;align-items:center;gap:8px;padding:0 20px;height:100%;background:transparent;border:none;border-bottom:3px solid transparent;color:var(--muted);font-family:var(--font-head);font-size:13px;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;cursor:pointer;white-space:nowrap;flex-shrink:0;transition:all 0.2s var(--ease)}
.tab-btn:hover{color:var(--text);background:rgba(255,255,255,0.04)}
.tab-btn.active{color:var(--text);border-bottom-color:var(--red);background:var(--red-dim)}
.tab-badge{display:inline-flex;align-items:center;justify-content:center;min-width:22px;height:22px;padding:0 5px;border-radius:4px;background:rgba(255,255,255,0.08);font-size:10px;font-weight:900}
.tab-btn.active .tab-badge{background:var(--red);color:#fff}
.tab-type-pill{font-size:9px;font-weight:700;letter-spacing:0.1em;padding:2px 6px;border-radius:3px;text-transform:uppercase;border:1px solid currentColor;opacity:0.6}
.tab-btn.active .tab-type-pill{opacity:1}
#stage{position:fixed;inset:0;z-index:100;background:#000;transition:top 0.2s var(--ease)}
#stage.has-tabs{top:var(--tab-h)}
#iframe-layer,#host-layer,#embed-layer{position:absolute;inset:0;width:100%;height:100%;border:none;background:#000}
#iframe-layer{display:none;z-index:1}
#host-layer{display:none;z-index:2}
#embed-layer{display:none;z-index:3;flex-direction:column}
#embed-layer.show{display:flex}
#embed-shimmer{position:absolute;inset:0;z-index:5;background:#080808;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;transition:opacity 0.35s ease}
#embed-shimmer.gone{opacity:0;pointer-events:none}
.shimmer-pulse{width:56px;height:56px;border-radius:50%;border:2px solid rgba(255,255,255,0.08);border-top-color:var(--red);animation:spin 1s linear infinite}
.shimmer-label{font-family:var(--font-head);font-size:13px;font-weight:700;letter-spacing:0.14em;text-transform:uppercase;color:var(--muted)}
.shimmer-bar-wrap{width:160px;height:2px;background:rgba(255,255,255,0.06);border-radius:2px;overflow:hidden}
.shimmer-bar-fill{height:100%;width:0%;background:var(--red);border-radius:2px;transition:width 0.6s ease}
#embed-frame{position:absolute;inset:0;width:100%;height:100%;border:none;background:#000;z-index:4;opacity:0;transition:opacity 0.4s ease}
#embed-frame.show{opacity:1}
#embed-error{position:absolute;inset:0;z-index:7;display:none;flex-direction:column;align-items:center;justify-content:center;gap:12px;padding:32px;background:rgba(0,0,0,0.92);backdrop-filter:blur(10px)}
#embed-error.show{display:flex}
#hud{position:absolute;top:0;left:0;right:0;z-index:20;padding:14px 18px;display:flex;align-items:center;justify-content:space-between;gap:12px;background:linear-gradient(to bottom,rgba(0,0,0,0.8) 0%,transparent 100%);pointer-events:none;transition:opacity 0.3s}
#hud.fade{opacity:0}
#live-badge{display:flex;align-items:center;gap:7px;background:var(--glass);border:1px solid var(--border2);backdrop-filter:blur(16px);padding:5px 14px 5px 10px;border-radius:100px;pointer-events:auto;opacity:0;transition:opacity 0.3s;max-width:55vw}
#live-badge.show{opacity:1}
.live-dot{width:7px;height:7px;border-radius:50%;background:var(--red);flex-shrink:0;animation:throb 1.8s ease-in-out infinite}
#badge-icon{font-size:14px}
#badge-label{font-family:var(--font-head);font-size:13px;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
#badge-type{font-family:var(--font-head);font-size:10px;font-weight:700;letter-spacing:0.1em;padding:2px 7px;border-radius:3px;border:1px solid rgba(255,255,255,0.2);text-transform:uppercase}
#hud-right{display:flex;gap:8px;pointer-events:auto;flex-shrink:0}
.hud-btn{display:flex;align-items:center;gap:6px;background:var(--glass);border:1px solid var(--border2);backdrop-filter:blur(16px);color:var(--text);padding:7px 15px;border-radius:100px;cursor:pointer;font-family:var(--font-head);font-size:12px;font-weight:700;letter-spacing:0.06em;text-transform:uppercase;transition:all 0.2s;white-space:nowrap}
.hud-btn:hover{background:rgba(255,255,255,0.12);transform:translateY(-2px)}
.hud-btn.accent{background:rgba(232,25,44,0.7)}
.hud-btn.accent:hover{background:var(--red)}
.hud-btn svg{width:13px;height:13px}
#embed-hud{display:none;align-items:center;gap:8px}
#embed-hud.show{display:flex}
#quality-bar{position:absolute;top:56px;left:18px;z-index:20;display:flex;align-items:center;gap:8px;opacity:0;pointer-events:none;transition:opacity 0.3s}
#quality-bar.show{opacity:1;pointer-events:auto}
#quality-select{background:var(--glass);border:1px solid var(--border2);backdrop-filter:blur(16px);color:var(--text);padding:5px 12px;border-radius:100px;font-family:var(--font-head);font-size:11px;font-weight:700;cursor:pointer}
#bottom-bar{position:absolute;bottom:0;left:0;right:0;z-index:20;padding:40px 18px 18px;background:linear-gradient(to top,rgba(0,0,0,0.85) 0%,transparent 100%);display:none;opacity:0;transition:opacity 0.3s}
#stage.native-controls #bottom-bar{display:block}
#stage.native-controls.ctrl-visible #bottom-bar{opacity:1}
.ctrl-row{display:flex;align-items:center;gap:10px;justify-content:space-between}
.ctrl-group{display:flex;align-items:center;gap:8px}
.vol-wrap{gap:8px}
.vol-label{font-family:var(--font-head);font-size:10px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;color:var(--muted)}
#vol-slider{width:90px;height:3px;background:rgba(255,255,255,0.18);border-radius:2px;cursor:pointer;-webkit-appearance:none}
#vol-slider::-webkit-slider-thumb{-webkit-appearance:none;width:12px;height:12px;border-radius:50%;background:var(--red);cursor:pointer}
.mini-btn{width:34px;height:34px;border-radius:var(--radius);display:flex;align-items:center;justify-content:center;background:var(--glass);border:1px solid var(--border);backdrop-filter:blur(12px);color:var(--text);cursor:pointer}
#center-play{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);z-index:22;width:76px;height:76px;border-radius:50%;background:rgba(0,0,0,0.55);border:2px solid rgba(255,255,255,0.25);backdrop-filter:blur(6px);display:none;align-items:center;justify-content:center;cursor:pointer}
#center-play.show{display:flex}
#center-play svg{width:36px;height:36px;fill:white;margin-left:4px}
#loading{position:absolute;inset:0;z-index:40;background:rgba(0,0,0,0.7);backdrop-filter:blur(5px);display:none;flex-direction:column;align-items:center;justify-content:center;gap:18px}
#loading.show{display:flex}
.ld-spinner{width:42px;height:42px;border-radius:50%;border:3px solid rgba(255,255,255,0.08);border-top-color:var(--red);animation:spin 0.75s linear infinite}
#ld-text{font-family:var(--font-head);font-size:13px;font-weight:700;letter-spacing:0.12em;text-transform:uppercase}
#ld-prog-wrap{width:180px;height:2px;background:rgba(255,255,255,0.08);border-radius:2px;overflow:hidden;display:none}
#ld-prog-wrap.show{display:block}
#ld-prog{height:100%;width:0%;background:var(--red);border-radius:2px;transition:width 0.4s}
#ld-step{font-size:10px;letter-spacing:0.08em;text-transform:uppercase;color:rgba(255,255,255,0.25);display:none}
#error-panel{position:absolute;inset:0;z-index:45;background:rgba(0,0,0,0.88);backdrop-filter:blur(8px);display:none;flex-direction:column;align-items:center;justify-content:center;gap:0;padding:32px}
#error-panel.show{display:flex;pointer-events:auto}
.err-box{background:rgba(232,25,44,0.06);border:1px solid rgba(232,25,44,0.22);border-radius:12px;padding:28px 28px 24px;max-width:480px;width:100%;text-align:center}
.err-icon{font-size:44px;margin-bottom:14px}
.err-title{font-family:var(--font-head);font-size:20px;font-weight:900;letter-spacing:0.06em;text-transform:uppercase;margin-bottom:8px}
.err-msg{font-size:13px;line-height:1.55;color:var(--muted);margin-bottom:10px}
.err-hint{font-size:11px;color:rgba(255,255,255,0.3);background:rgba(255,255,255,0.03);border:1px solid var(--border);border-radius:6px;padding:8px 12px;margin-bottom:14px;display:none}
.err-detail{font-size:10px;font-family:monospace;color:rgba(255,255,255,0.3);background:rgba(0,0,0,0.4);border-radius:6px;padding:8px 10px;margin-bottom:14px;max-height:80px;overflow:auto;display:none}
.err-actions{display:flex;gap:8px;justify-content:center;flex-wrap:wrap}
.err-btn{padding:9px 22px;border-radius:var(--radius);border:none;cursor:pointer;font-family:var(--font-head);font-size:13px;font-weight:700;letter-spacing:0.06em;text-transform:uppercase;transition:all 0.2s}
.err-btn.primary{background:var(--red);color:#fff}
.err-btn.secondary{background:rgba(255,255,255,0.08);color:var(--text);border:1px solid var(--border2)}
.err-retry-info{font-size:10px;color:rgba(255,255,255,0.3);margin-top:10px}
#status-msg{position:absolute;bottom:70px;left:50%;transform:translateX(-50%) translateY(8px);z-index:30;background:var(--glass);border:1px solid var(--border2);backdrop-filter:blur(16px);color:var(--text);font-family:var(--font-head);font-size:12px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;padding:8px 20px;border-radius:100px;white-space:nowrap;opacity:0;transition:opacity 0.25s,transform 0.25s}
#status-msg.show{opacity:1;transform:translateX(-50%) translateY(0)}
#info-panel{position:absolute;top:58px;left:18px;z-index:20;background:var(--glass);border:1px solid var(--border);backdrop-filter:blur(16px);padding:10px 14px;border-radius:var(--radius);opacity:0;pointer-events:none;max-width:240px;transition:opacity 0.3s}
#info-panel.show{opacity:1}
.info-row{display:flex;justify-content:space-between;gap:14px;font-size:11px;margin-bottom:5px;padding-bottom:5px;border-bottom:1px solid var(--border)}
.info-row:last-child{border-bottom:none;margin-bottom:0}
.info-k{color:var(--muted);text-transform:uppercase;letter-spacing:0.05em;font-size:10px}
.info-v{color:var(--text);font-weight:600}
#bw{position:absolute;top:58px;right:18px;z-index:20;display:flex;align-items:center;gap:6px;background:var(--glass);border:1px solid var(--border);backdrop-filter:blur(12px);padding:5px 10px;border-radius:100px;font-size:10px;opacity:0;transition:opacity 0.3s}
#bw.show{opacity:1}
.bw-bars{display:flex;align-items:flex-end;gap:2px;height:11px}
.bw-bar{width:3px;border-radius:1px;background:rgba(255,255,255,0.15);transition:background 0.4s}
.bw-bar.on{background:var(--success)}
.bw-bar:nth-child(1){height:4px}
.bw-bar:nth-child(2){height:6px}
.bw-bar:nth-child(3){height:9px}
.bw-bar:nth-child(4){height:11px}
#gesture-hint{position:absolute;bottom:68px;left:50%;transform:translateX(-50%);z-index:25;background:var(--glass);border:1px solid var(--border);backdrop-filter:blur(12px);padding:7px 16px;border-radius:100px;opacity:0;transition:opacity 0.3s;white-space:nowrap}
#gesture-hint.show{opacity:1}
#shortcuts-ov{position:absolute;inset:0;z-index:50;background:rgba(0,0,0,0.92);backdrop-filter:blur(10px);display:none;flex-direction:column;align-items:center;justify-content:center;gap:0;padding:32px}
#shortcuts-ov.show{display:flex;pointer-events:auto}
.sc-box{background:rgba(255,255,255,0.04);border:1px solid var(--border2);border-radius:12px;padding:28px;max-width:560px;width:100%}
.sc-title{font-family:var(--font-head);font-size:22px;font-weight:900;letter-spacing:0.1em;text-transform:uppercase;text-align:center;margin-bottom:22px}
.sc-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.sc-item{display:flex;align-items:center;gap:10px;padding:8px 12px;border-radius:6px;background:rgba(255,255,255,0.02);border:1px solid var(--border)}
.sc-key{background:var(--red);color:#fff;padding:3px 9px;border-radius:4px;font-family:monospace;font-size:11px;font-weight:700;min-width:38px;text-align:center}
.sc-desc{font-size:12px;color:var(--muted)}
.sc-close{margin-top:20px;width:100%;padding:10px;background:var(--red);color:#fff;border:none;border-radius:var(--radius);cursor:pointer;font-family:var(--font-head);font-size:13px;font-weight:700;letter-spacing:0.08em;text-transform:uppercase}
#init-ph{position:absolute;inset:0;z-index:6;display:flex;align-items:center;justify-content:center;background:var(--bg)}
.fallback-wrap{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:20px;padding:32px;background:#0a0a0a}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes throb{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.35;transform:scale(.65)}}
@media (max-width:600px){:root{--tab-h:44px}.tab-btn{padding:0 14px;font-size:12px}.tab-type-pill{display:none}.hud-btn{padding:6px 11px;font-size:11px}.hud-btn .lbl{display:none}#vol-slider{width:70px}.sc-grid{grid-template-columns:1fr}}
</style>
</head>
<body>
<div id="tab-bar"></div>
<div id="stage">
  <div id="init-ph"><p>Initializing player…</p></div>
  <iframe id="iframe-layer" allow="encrypted-media; autoplay; fullscreen" sandbox="allow-pointer-lock allow-same-origin allow-scripts allow-presentation" allowfullscreen></iframe>
  <div id="host-layer"></div>
  <div id="embed-layer">
    <div id="embed-shimmer"><div class="shimmer-pulse"></div><span class="shimmer-label">Connecting to stream…</span><div class="shimmer-bar-wrap"><div class="shimmer-bar-fill" id="shimmer-fill"></div></div></div>
    <iframe id="embed-frame" allow="autoplay; encrypted-media; fullscreen; picture-in-picture; clipboard-write; web-share; accelerometer; gyroscope" referrerpolicy="no-referrer-when-downgrade" sandbox="allow-scripts allow-same-origin allow-forms allow-pointer-lock allow-presentation allow-popups allow-popups-to-escape-sandbox allow-top-navigation-by-user-activation allow-downloads" allowfullscreen></iframe>
    <div id="embed-error"><span id="embed-err-icon" style="font-size:44px;">📡</span><div id="embed-err-title" class="err-title">Stream not working</div><div id="embed-err-msg" class="err-msg"></div><div class="err-actions"><button class="err-btn primary" id="embed-retry-btn">↺ Retry</button><button class="err-btn secondary" id="embed-next-btn">Next Source</button></div></div>
  </div>
  <div id="hud"><div id="live-badge"><span class="live-dot"></span><span id="badge-icon"></span><span id="badge-label">LIVE</span><span id="badge-type"></span></div><div id="hud-right"><div id="embed-hud"><button class="hud-btn" id="embed-reload-btn"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg><span class="lbl">Reload</span></button></div><button class="hud-btn accent" id="btn-refresh"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg><span class="lbl">Refresh</span></button><button class="hud-btn" id="btn-fullscreen"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3m0 18h3a2 2 0 0 0 2-2v-3M3 16v3a2 2 0 0 0 2 2h3"/></svg><span class="lbl">Full</span></button></div></div>
  <div id="quality-bar"><select id="quality-select"><option value="-1">Quality: Auto</option></select></div>
  <div id="bottom-bar"><div class="ctrl-row"><div class="ctrl-group vol-wrap"><span class="vol-label">Vol</span><input type="range" id="vol-slider" min="0" max="100" value="100"></div><div class="ctrl-group"><button class="mini-btn" id="btn-pip"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><rect x="2" y="2" width="20" height="20" rx="2"/><rect x="14" y="10" width="8" height="8" rx="1"/></svg></button><button class="mini-btn" id="btn-help"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><circle cx="12" cy="12" r="10"/><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg></button></div></div></div>
  <div id="center-play"><svg viewBox="0 0 24 24"><polygon points="8,5 8,19 19,12" fill="white"/></svg></div>
  <div id="info-panel"><div class="info-row"><span class="info-k">Stream</span><span class="info-v" id="info-stream">—</span></div><div class="info-row"><span class="info-k">Player</span><span class="info-v" id="info-player">—</span></div><div class="info-row"><span class="info-k">Status</span><span class="info-v" id="info-status">—</span></div><div class="info-row"><span class="info-k">Latency</span><span class="info-v" id="info-latency">…</span></div></div>
  <div id="bw"><div class="bw-bars"><div class="bw-bar" id="bw1"></div><div class="bw-bar" id="bw2"></div><div class="bw-bar" id="bw3"></div><div class="bw-bar" id="bw4"></div></div><span id="bw-lbl">…</span></div>
  <div id="gesture-hint"></div><div id="status-msg"></div>
  <div id="loading"><div class="ld-spinner"></div><div id="ld-text">Loading stream…</div><div id="ld-prog-wrap"><div id="ld-prog"></div></div><div id="ld-step"></div></div>
  <div id="error-panel"><div class="err-box"><span class="err-icon" id="err-icon">⚠️</span><div class="err-title" id="err-title">Stream Failed</div><div class="err-msg" id="err-msg"></div><div class="err-hint" id="err-hint"></div><div class="err-detail" id="err-detail"></div><div class="err-actions"><button class="err-btn primary" id="btn-retry">↺ Retry</button><button class="err-btn secondary" id="btn-fallback">Use Backup</button></div><div class="err-retry-info" id="err-retry-info"></div></div></div>
  <div id="shortcuts-ov"><div class="sc-box"><div class="sc-title">⌨ Shortcuts</div><div class="sc-grid"><div class="sc-item"><span class="sc-key">S</span><span class="sc-desc">Next stream</span></div><div class="sc-item"><span class="sc-key">R</span><span class="sc-desc">Refresh</span></div><div class="sc-item"><span class="sc-key">F</span><span class="sc-desc">Fullscreen</span></div><div class="sc-item"><span class="sc-key">P</span><span class="sc-desc">PiP</span></div><div class="sc-item"><span class="sc-key">V</span><span class="sc-desc">Mute</span></div><div class="sc-item"><span class="sc-key">?</span><span class="sc-desc">Help</span></div><div class="sc-item"><span class="sc-key">1–9</span><span class="sc-desc">Jump to stream</span></div><div class="sc-item"><span class="sc-key">↑/↓</span><span class="sc-desc">Volume</span></div></div><button class="sc-close" id="close-help">Close</button></div></div>
</div>
<script>

async function fetchWithProxies(url){let order=[...CFG.PROXY_SCORES.keys()].sort((a,b)=>CFG.PROXY_SCORES[b]-CFG.PROXY_SCORES[a]);let lastErr;for(let i of order){let pu=CFG.PROXIES[i](url);let ac=abort(9000);try{let r=await fetch(pu,{signal:ac.signal});clearTimeout(ac._t);if(!r.ok)throw new Error(`HTTP ${r.status}`);let text=await r.text();if(pu.includes('allorigins')){try{let j=JSON.parse(text);if(j.contents!=null)text=j.contents;}catch{}}CFG.PROXY_SCORES[i]=Math.max(CFG.PROXY_SCORES[i],1);return text;}catch(e){clearTimeout(ac._t);CFG.PROXY_SCORES[i]=Math.max(0,CFG.PROXY_SCORES[i]-1);lastErr=e;}}throw lastErr||new Error('All proxies failed');}
function extractClearKeys(html){let r1=html.match(/"([0-9a-fA-F]{32})"\s*:\s*"([0-9a-fA-F]{32})"/g);if(r1){let m=r1[0].match(/"(.+)"\s*:\s*"(.+)"/);if(m&&m[1]!=='0'.repeat(32))return{keyId:m[1],key:m[2]};}return null;}
function extractManifest(html){let VAR='manifestUri|manifest_uri|manifesturl|streamUrl|stream_url|hlsUrl|dashUrl|videoUrl|sourceUrl|liveUrl|linkStream|urlStream|file';let re1=new RegExp(`(?:const|var|let)\\s+(?:${VAR})\\s*=\\s*['"\`]([^'"\`]+)['"\`]`,'i');let re2=new RegExp(`(?:${VAR})\\s*=\\s*['"\`]([^'"\`]+)['"\`]`,'i');let matchers=[html=>{let m=html.match(re1);return m&&isSafeUrl(m[1])?m[1]:null;},html=>{let m=html.match(re2);return m&&isSafeUrl(m[1])?m[1]:null;},html=>{let m=html.match(/\.(?:load|loadSource)\s*\(\s*['"`]([^'"`]+)['"`]/i);return m&&isSafeUrl(m[1])?m[1]:null;},html=>{let m=html.match(/file\s*:\s*["'`](https?:\/\/[^"'`\s]+\.(?:m3u8|mpd)[^"'`\s]*)/i);return m&&isSafeUrl(m[1])?m[1]:null;},html=>{let m=html.match(/"(?:file|src|url)"\s*:\s*"(https?:\/\/[^"]+\.(?:m3u8|mpd)[^"]*)"/i);return m&&isSafeUrl(m[1])?m[1]:null;},html=>{let m=html.match(/(?:src|source)\s*[=:]\s*["'`](https?:\/\/[^"'`\s]+\.(?:m3u8|mpd)[^"'`\s]*)/i);return m&&isSafeUrl(m[1])?m[1]:null;},html=>{let b64re=/atob\s*\(\s*["']([A-Za-z0-9+/=]{30,})["']\s*\)/g;let bm;while((bm=b64re.exec(html))!==null){try{let d=atob(bm[1]);if(/^https?:\/\//i.test(d)&&isSafeUrl(d))return d;}catch{}}return null;},html=>{let m=html.match(/https?:\/\/[^\s"'`<>\\]+\.m3u8[^\s"'`<>\\]*/);return m?m[0]:null;},html=>{let m=html.match(/https?:\/\/[^\s"'`<>\\]+\.mpd[^\s"'`<>\\]*/);return m?m[0]:null;}];let streamUrl=null;for(let fn of matchers){streamUrl=fn(html);if(streamUrl)break;}if(!streamUrl){let ifrRe=/<iframe[^>]+src=["']([^"']+)["']/gi,ifrUrls=[],im;while((im=ifrRe.exec(html))!==null){let c=im[1].replace(/&amp;/g,'&').trim();if(isSafeUrl(c)&&!c.includes('blogger.com')&&!c.includes('google.com'))ifrUrls.push(c);}if(ifrUrls.length)return{streamUrl:ifrUrls[0],drmKeys:null,isEmbed:true,embedUrls:ifrUrls};return null;}let drmKeys=extractClearKeys(html);if(streamUrl.includes('!!')){let[s,kp]=streamUrl.split('!!');streamUrl=s;if(kp&&kp.includes(':')&&!drmKeys){let[kid,k]=kp.split(':');drmKeys={keyId:kid,key:k};}}return{streamUrl,drmKeys};}
async function resolveStream(url){let ck=CFG.CACHE_PFX+url;let cached=Cache.get(ck);if(cached)return cached;if(url.includes('.mpd!!')){let[mpdUrl,kp]=url.split('!!');let drmKeys=null;if(kp&&kp.includes(':')){let[kid,k]=kp.split(':');drmKeys={keyId:kid,key:k};}let r={type:'dash',url:mpdUrl,drmKeys};Cache.set(ck,r);return r;}if(/\.m3u8([?&#]|$)/i.test(url)){let r={type:'hls',url};Cache.set(ck,r);return r;}if(/\.mpd([?&#]|$)/i.test(url)){let drmKeys=null;if(drmKey&&drmKey.includes(':')){let sep=drmKey.indexOf(':');drmKeys={keyId:drmKey.slice(0,sep).trim(),key:drmKey.slice(sep+1).trim()};}let r={type:'dash',url,drmKeys};Cache.set(ck,r);return r;}return withRetry(async()=>{let html=await fetchWithProxies(url);let ex=extractManifest(html);if(!ex)throw new Error('No stream URL found');if(ex.isEmbed){let r={type:'embed',url:ex.streamUrl,embedUrls:ex.embedUrls||[ex.streamUrl]};Cache.set(ck,r);return r;}let{streamUrl:dst,drmKeys}=ex;if(!isSafeUrl(dst))throw new Error('Resolved URL is unsafe');if(!drmKeys&&drmKey&&drmKey.includes(':')){let sep=drmKey.indexOf(':');drmKeys={keyId:drmKey.slice(0,sep).trim(),key:drmKey.slice(sep+1).trim()};}let type=/\.m3u8([?&#]|$)/i.test(dst)?'hls':'dash';let r={type,url:dst,...(drmKeys&&{drmKeys})};Cache.set(ck,r);return r;});}
async function loadStreams(){let result=[];showLoading(true,'Resolving streams…',10,'Fetching manifests');let moraResults=await Promise.allSettled(moraParams.map(u=>resolveStream(u)));let hls=[],dash=[],emb=[];moraResults.forEach((r,i)=>{if(r.status==='fulfilled'&&r.value){let s={...r.value,originalUrl:moraParams[i]};if(s.type==='hls')hls.push(s);else if(s.type==='dash')dash.push(s);else emb.push(s);}});result.push(...(isIOS()?hls:[...hls,...dash]),...emb);if(!isIOS())result.push(...dash.filter(s=>!result.includes(s)));if(embedParams.length){let detected=embedParams.map(u=>{let t=detectType(u);return{type:t==='embed'?'embed':t,url:u,embedUrls:t==='embed'?embedParams:[u],originalUrl:u};});let directEmbed=detected.filter(s=>s.type!=='embed');let ifrEmbed=detected.filter(s=>s.type==='embed');result.unshift(...directEmbed);result.push(...ifrEmbed.slice(0,1));}return result;}
// ========== TAB BAR ==========
const TabBar=(()=>{let _tabs=[];function build(streams){D.tabBar.innerHTML='';_tabs=[];if(streams.length<2){D.tabBar.classList.remove('show');D.stage.classList.remove('has-tabs');return;}streams.forEach((s,i)=>{let def=streamDef(i);let btn=document.createElement('button');btn.className='tab-btn';btn.dataset.i=i;let typeLabel=s.type==='embed'?'EMBED':s.type==='hls'?'HLS':s.type==='dash'?'DASH':'LIVE';btn.innerHTML=`<span class="tab-badge">${i+1}</span>${def.name}<span class="tab-type-pill">${typeLabel}</span>`;btn.addEventListener('click',()=>{if(parseInt(btn.dataset.i)!==curIdx)go(parseInt(btn.dataset.i));});D.tabBar.appendChild(btn);_tabs.push(btn);});D.tabBar.classList.add('show');D.stage.classList.add('has-tabs');}function setActive(i){_tabs.forEach((t,j)=>t.classList.toggle('active',j===i));}return{build,setActive};})();
// ========== EVENT BINDINGS ==========
D.btnRefresh.addEventListener('click',()=>refresh());
D.btnFullscreen.addEventListener('click',()=>{if(!document.fullscreenElement)D.stage.requestFullscreen().catch(()=>showStatus('Fullscreen unavailable'));else document.exitFullscreen();});
D.btnPip.addEventListener('click',()=>{if(!(curPlayer instanceof HTMLVideoElement)){showStatus('PiP unavailable');return;}if(document.pictureInPictureElement)document.exitPictureInPicture();else curPlayer.requestPictureInPicture().catch(()=>showStatus('PiP unavailable'));});
D.btnHelp.addEventListener('click',()=>{D.scOv.classList.add('show');});
D.closeHelp.addEventListener('click',()=>{D.scOv.classList.remove('show');});
D.btnRetry.addEventListener('click',()=>{if(retryCount<CFG.MAX_RETRIES){retryCount++;hideErrPanel();go(curIdx);}else showStatus('Max retries reached — try another stream');});
D.btnFallback.addEventListener('click',()=>{hideErrPanel();let wrap=document.createElement('div');wrap.className='fallback-wrap';let fs=isSafeUrl(CFG.FALLBACK_URL)?CFG.FALLBACK_URL:'';wrap.innerHTML=`<div class="err-title">⚠ Stream Unavailable</div><p>All player engines failed. Showing backup channel.</p>${fs?`<iframe src="${fs}" allowfullscreen sandbox="${CFG.EMBED_SANDBOX}"></iframe>`:'<p>No backup available.</p>'}`;D.hostLay.appendChild(wrap);D.hostLay.style.display='block';});
D.embedRetryBtn.addEventListener('click',()=>EmbedMgr.retry());
D.embedNxtBtn.addEventListener('click',()=>EmbedMgr.nextSource());
D.embedReloadBtn.addEventListener('click',()=>refresh());
D.centerPlay.addEventListener('click',()=>{if(!curStream||curStream.type==='embed')return;let tryPP=p=>{if(!p)return false;if(typeof p.paused==='boolean'){p.paused?p.play().catch(()=>{}):p.pause();return true;}if(p.play&&p.pause){p.paused?p.play():p.pause();return true;}return false;};if(!tryPP(curPlayer))activeInst.some(tryPP);updatePlayBtn();});
D.volSlider.addEventListener('input',e=>{let vol=Number(e.target.value)/100;if(curPlayer instanceof HTMLMediaElement){curPlayer.volume=vol;curPlayer.muted=(vol===0);}});
D.stage.addEventListener('mousemove',()=>{if(!D.stage.classList.contains('native-controls'))return;D.stage.classList.add('ctrl-visible');schedCtrlHide();});
D.stage.addEventListener('click',e=>{if(e.target.closest('button, select, input, .tab-btn, #center-play'))return;if(!D.stage.classList.contains('native-controls'))return;D.stage.classList.toggle('ctrl-visible');if(D.stage.classList.contains('ctrl-visible'))schedCtrlHide();});
document.addEventListener('keydown',e=>{if(e.target!==document.body)return;let k=e.key.toLowerCase();if(k==='s'){e.preventDefault();switchNext();}if(k==='r'){e.preventDefault();refresh();}if(k==='f'){e.preventDefault();if(!document.fullscreenElement)D.stage.requestFullscreen();else document.exitFullscreen();}if(k==='p'){e.preventDefault();if(!(curPlayer instanceof HTMLVideoElement)){showStatus('PiP unavailable');return;}if(document.pictureInPictureElement)document.exitPictureInPicture();else curPlayer.requestPictureInPicture().catch(()=>showStatus('PiP unavailable'));}if(k==='v'){e.preventDefault();D.volSlider.value=D.volSlider.value==='0'?'100':'0';D.volSlider.dispatchEvent(new Event('input'));}if(e.key==='?'){e.preventDefault();D.scOv.classList.add('show');}let n=parseInt(e.key,10);if(!isNaN(n)&&n>=1&&n<=streams.length){e.preventDefault();go(n-1);showStatus(`${streamDef(n-1).icon} ${streamDef(n-1).name}`);}if(D.stage.classList.contains('native-controls')){if(e.key==='ArrowUp'){e.preventDefault();D.volSlider.value=String(Math.min(100,parseInt(D.volSlider.value,10)+5));D.volSlider.dispatchEvent(new Event('input'));}if(e.key==='ArrowDown'){e.preventDefault();D.volSlider.value=String(Math.max(0,parseInt(D.volSlider.value,10)-5));D.volSlider.dispatchEvent(new Event('input'));}}});
const BW={start(){this.measure();setInterval(()=>this.measure(),30000);},async measure(){let t0=Date.now();let url=`https://cdn.jsdelivr.net/npm/hls.js@1.5.7/dist/hls.min.js?_t=${t0}`;try{let ac=abort(6000);let res=await fetch(url,{cache:'no-store',signal:ac.signal});clearTimeout(ac._t);let blob=await res.blob();let kbps=Math.round((blob.size*8)/(((Date.now()-t0)/1000)*1000));let bars=[D.bw1,D.bw2,D.bw3,D.bw4];let lvl=kbps>5000?4:kbps>2000?3:kbps>500?2:1;bars.forEach((b,i)=>b.classList.toggle('on',i<lvl));D.bwLbl.textContent=kbps>1000?`${(kbps/1000).toFixed(1)} Mbps`:`${kbps} kbps`;D.bw.classList.add('show');}catch{}}};
const Gestures={_start:null,init(){D.stage.addEventListener('touchstart',e=>{let t=e.touches[0];this._start={x:t.clientX,y:t.clientY,ms:Date.now()};},{passive:true});D.stage.addEventListener('touchend',e=>{if(!this._start)return;let t=e.changedTouches[0];let dx=t.clientX-this._start.x,dy=t.clientY-this._start.y,dt=Date.now()-this._start.ms;this._start=null;if(dt>600||(Math.abs(dx)<CFG.GESTURE_PX&&Math.abs(dy)<CFG.GESTURE_PX))return;let horiz=Math.abs(dx)>Math.abs(dy);if(horiz){if(dx<-CFG.GESTURE_PX){switchNext();this._hint('→ Next Stream');}else{refresh();this._hint('↺ Refresh');}}else if(D.stage.classList.contains('native-controls')){let d=dy<0?10:-10,nv=Math.max(0,Math.min(100,parseInt(D.volSlider.value,10)+d));D.volSlider.value=String(nv);D.volSlider.dispatchEvent(new Event('input'));this._hint(dy<0?`🔊 Vol ${nv}%`:`🔉 Vol ${nv}%`);}},{passive:true});let firstTouch=true;D.stage.addEventListener('touchend',()=>{if(!firstTouch)return;firstTouch=false;if(document.documentElement.requestFullscreen&&!document.fullscreenElement){D.stage.requestFullscreen().catch(()=>{});}},{passive:true,once:true});},_hint(msg){clearTimeout(gestTimer);D.gestHint.textContent=msg;D.gestHint.classList.add('show');gestTimer=setTimeout(()=>D.gestHint.classList.remove('show'),1800);}};
// ========== INIT ==========
(async()=>{if(!moraParams.length&&!embedParams.length){D.initPh.innerHTML='<p style="font-family:\'Barlow Condensed\',sans-serif;font-size:13px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:rgba(255,255,255,.2);">No stream source provided.</p>';showLoading(false);return;}BW.start();Gestures.init();streams=await loadStreams();if(!streams.length){D.initPh.innerHTML='<p style="font-family:\'Barlow Condensed\',sans-serif;font-size:13px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:rgba(255,255,255,.2);">No playable streams found.</p>';let wrap=document.createElement('div');wrap.className='fallback-wrap';let fs=isSafeUrl(CFG.FALLBACK_URL)?CFG.FALLBACK_URL:'';wrap.innerHTML=`<div class="err-title">⚠ No Streams</div><p>Could not resolve any stream from sources.</p>${fs?`<iframe src="${fs}" allowfullscreen sandbox="${CFG.EMBED_SANDBOX}"></iframe>`:''}`;D.hostLay.appendChild(wrap);D.hostLay.style.display='block';showLoading(false);return;}TabBar.build(streams);let savedIdx=0;try{let s=parseInt(localStorage.getItem(CFG.STORE_KEY),10);if(!isNaN(s)&&s>=0&&s<streams.length)savedIdx=s;}catch{}await go(savedIdx);})();
</script>
